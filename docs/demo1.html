<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Demo 1 — Page scrollbar | scrollbar-clone</title>
        <link rel="stylesheet" href="style.css" />
        <script
            type="module"
            src="https://unpkg.com/scrollbar-clone@0.0.5/dist/index.mjs"
        ></script>
        <style>
            .demo-single {
                padding: 2rem;
                min-height: 100vh;
                position: relative;
            }
            .demo-single h2 {
                font-size: 1.3rem;
                margin-bottom: 0.5rem;
            }
            .demo-single p.desc {
                color: #666;
                margin-bottom: 1.5rem;
                max-width: 600px;
                line-height: 1.5;
            }
            .controls {
                position: fixed;
                top: 72px;
                right: 1.5rem;
                background: #fff;
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 0.75rem 1rem;
                z-index: 5;
                font-size: 0.85rem;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }
            .controls label {
                cursor: pointer;
                display: block;
                margin: 0.25rem 0;
            }
            .controls input[type='checkbox'] {
                margin-right: 0.5rem;
            }

            .content-block {
                max-width: 700px;
                margin: 0 auto;
                padding: 1rem 0;
            }
            .content-block p {
                margin-bottom: 1rem;
                line-height: 1.6;
                color: #444;
            }
        </style>
    </head>
    <body class="demo-1">
        <header class="header">
            <h1><a href="index.html">&lt;scrollbar-clone&gt;</a></h1>
            <nav>
                <a href="demo1.html">Demo 1</a>
                <a href="demo2.html">Demo 2</a>
            </nav>
            <span class="spacer"></span>
            <a href="https://www.npmjs.com/package/scrollbar-clone">npm</a>
            <a href="https://github.com/yakunins/scrollbar-clone">GitHub</a>
        </header>

        <div class="main">
            <section class="demo-single">
                <div class="controls">
                    <label>
                        <input type="checkbox" id="toggle-disable" />
                        disable-scroll
                    </label>
                    <label>
                        <input type="checkbox" id="toggle-origin" />
                        show-origin-scrollbar
                    </label>
                </div>

                <scrollbar-clone
                    id="page-scrollbar"
                    show-origin-scrollbar="false"
                    style="
                        height: 100dvh;
                        position: fixed;
                        top: 0;
                        right: 0;
                        z-index: 100;
                    "
                ></scrollbar-clone>
                <style>
                    .scrollbar-clone__scrollbar::-webkit-scrollbar-track {
                        background-color: transparent;
                    }
                    .scrollbar-clone__scrollbar {
                        scrollbar-color: #888 transparent;
                    }
                </style>

                <div class="content-block">
                    <h2>Demo 1 — Page scrollbar</h2>
                    <p class="desc">
                        A <code>&lt;scrollbar-clone&gt;</code> mirrors the page
                        scrollbar. The original scrollbar is hidden; the clone
                        is fixed on the right, with a fade-in effect on hover
                        and scroll.
                    </p>
                    <hr
                        style="
                            border: none;
                            height: 1px;
                            background-color: rgba(127, 127, 127, 0.25);
                        "
                    />
                </div>
                <div class="content-block" id="lorem-content"></div>
            </section>
        </div>

        <script>
            const lorem =
                'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.';
            const short =
                'Cras mattis consectetur purus sit amet fermentum. Maecenas sed diam eget risus varius blandit sit amet non magna. Donec id elit non mi porta gravida at eget metus. Nullam quis risus eget urna mollis ornare vel eu leo.';

            const el = document.getElementById('lorem-content');
            const texts = [lorem, short];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('p');
                p.textContent = texts[i % texts.length];
                el.appendChild(p);
            }

            const clone = document.getElementById('page-scrollbar');
            document
                .getElementById('toggle-disable')
                .addEventListener('change', (e) => {
                    clone.setAttribute(
                        'disable-scroll',
                        e.target.checked ? 'true' : 'false',
                    );
                });
            document
                .getElementById('toggle-origin')
                .addEventListener('change', (e) => {
                    clone.setAttribute(
                        'show-origin-scrollbar',
                        e.target.checked ? 'true' : 'false',
                    );
                });
        </script>
    </body>
</html>
