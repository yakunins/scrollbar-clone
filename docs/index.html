<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>scrollbar-clone</title>
        <link rel="stylesheet" href="style.css" />
        <style>
            .landing {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: calc(100vh - 56px);
                text-align: center;
                padding: 2rem;
            }
            .landing h2 {
                font-size: 2rem;
                margin-bottom: 0.5rem;
            }
            .landing p {
                color: #666;
                max-width: 480px;
                line-height: 1.6;
                margin-bottom: 2rem;
            }
            .demo-links {
                display: flex;
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .demo-link {
                display: block;
                padding: 1rem 2rem;
                background: #1a1a2e;
                color: #fff;
                text-decoration: none;
                border-radius: 8px;
                font-size: 0.95rem;
                transition: background 0.2s;
            }
            .demo-link:hover {
                background: #2a2a4e;
            }
            .demo-link small {
                display: block;
                color: rgba(255, 255, 255, 0.6);
                font-size: 0.75rem;
                margin-top: 0.25rem;
            }
        </style>
    </head>
    <body>
        <header class="header">
            <h1><a href="index.html">&lt;scrollbar-clone&gt;</a></h1>
            <nav>
                <a href="demo1.html">Page scrollbar</a>
                <a href="demo2.html">Multi-panel</a>
                <a href="demo3.html">Position</a>
            </nav>
            <span class="spacer"></span>
            <a href="https://www.npmjs.com/package/scrollbar-clone">npm</a>
            <a href="https://github.com/yakunins/scrollbar-clone">GitHub</a>
        </header>

        <div class="main">
            <section class="landing">
                <h2>&lt;scrollbar-clone&gt;</h2>
                <p>Turns a scrollbar into a normal HTML element.</p>
                <div class="demo-links">
                    <a class="demo-link" href="demo1.html">
                        Page scrollbar
                        <small>Replace the native page scrollbar</small>
                    </a>
                    <a class="demo-link" href="demo2.html">
                        Multi-panel layout
                        <small>Three independent scrollbar clones</small>
                    </a>
                    <a class="demo-link" href="demo3.html">
                        Scrollbar position
                        <small>Custom position with CSS animation</small>
                    </a>
                </div>
            </section>
        </div>
    </body>
</html>
